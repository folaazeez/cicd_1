name: promote

on:
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Image tag to deploy (usually a commit SHA)"
                required: true
            environment:
                description: "Target environment"
                required: true
                type: choice
                options:
                    - staging
                    - prod
            replica_count:
                description: "Desired replica count (required for prod; staging can be blank to default)"
                required: false

jobs:
    deploy:
        runs-on: ubuntu-22.04
        environment: ${{ inputs.environment }}
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: arn:aws:iam::490159260943:role/github-actions-terraform
                  aws-region: eu-west-2

            - name: Set image URI
              run: echo "IMAGE_URI=490159260943.dkr.ecr.eu-west-2.amazonaws.com/policy-gate:${{ inputs.image_tag }}" >> $GITHUB_ENV

            - name: Set up python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Resolve replica count
              run: |
                  if [ -z "${{ inputs.replica_count }}" ]; then
                    echo "REPLICAS=1" >> $GITHUB_ENV
                  else
                    echo "REPLICAS=${{ inputs.replica_count }}" >> $GITHUB_ENV
                  fi

            - name: Policy gate (promotion)
              env:
                  ENVIRONMENT: ${{ inputs.environment }}
                  REPLICA_COUNT: ${{ env.REPLICAS }}
              run: python scripts/policy_check.py

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: "1.6.6"
                  terraform_wrapper: false

            - name: Terraform init (deploy)
              working-directory: infra/deploy
              run: terraform init

            - name: Terraform validate (deploy)
              working-directory: infra/deploy
              run: terraform validate

            - name: Terraform plan (deploy)
              working-directory: infra/deploy
              run: terraform plan -no-color -out=tfplan -var="replica_count=$REPLICAS" -var="policy_gate_image=$IMAGE_URI" -var="environment=${{ inputs.environment }}"

            - name: Terraform show (summary)
              working-directory: infra/deploy
              run: terraform show -no-color tfplan

            - name: Upload plan artifact
              uses: actions/upload-artifact@v4
              with:
                  name: tfplan-${{ inputs.environment }}-${{ inputs.image_tag }}
                  path: infra/deploy/tfplan

            - name: Terraform apply (deploy)
              working-directory: infra/deploy
              run: terraform apply -auto-approve tfplan
